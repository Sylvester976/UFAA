{% extends 'recruitment/hr/base_hr.html' %}

{% block title %}Add Section{% endblock %}

{% block content %}

<div class="container-fluid py-2">

<div class="dash-header-banner mb-2">
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

<div>
<h4>
<i class="fas fa-layer-group me-2" style="color:var(--gold-dark);"></i>
Add Section
</h4>
<p>Configure scoring section for interview template</p>
</div>

</div>
</div>

<div class="gold-divider"></div>

<div class="row justify-content-center">
<div class="col-lg-6">

<div class="card dash-card brand-card">

<div class="card-header">
<h6 class="mb-0">Template: {{ template.name }}</h6>
<p>Create a new scoring section</p>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Section Name</label>
<input type="text" name="name" class="form-control"
value="{{ section.name|default:'' }}" required>
</div>

<div class="mb-3">
<label class="form-label">Max Score</label>
<input type="number" name="max_score" class="form-control"
value="{{ section.max_score|default:'' }}" required>
</div>

<div class="mb-3">
<label class="form-label">Weight</label>
<input type="number" step="0.01" name="weight" class="form-control"
value="{{ section.weight|default:1 }}">
</div>

<div class="mb-3">
<label class="form-label">Order</label>
<input type="number" name="order" class="form-control"
value="{{ section.order|default:0 }}">
</div>

<button class="btn btn-brand">
<i class="fas fa-save me-1"></i>
Save Section
</button>

</form>

</div>
</div>

</div>
</div>

</div>

{% endblock %}
