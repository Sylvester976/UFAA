{% extends "recruitment/hr/base_hr.html" %}
{% block title %}Not Assigned{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div style="max-width:480px;margin:3rem auto;text-align:center;">
        <div style="width:72px;height:72px;border-radius:50%;
                    background:#fde8e8;display:flex;align-items:center;
                    justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;color:#c0392b;">
            <i class="fas fa-user-slash"></i>
        </div>
        <h5 style="color:#262561;font-weight:700;margin-bottom:0.5rem;">
            Not Assigned
        </h5>
        <p style="font-size:0.83rem;color:#8392ab;margin-bottom:1.5rem;">
            You are not assigned to the shortlisting committee for this vacancy,
            or your assignment is no longer active.
        </p>
        <a href="{% url 'committee_dashboard' %}"
           style="background:#262561;color:#fff;padding:0.5rem 1.25rem;
                  border-radius:0.45rem;font-size:0.8rem;font-weight:600;
                  text-decoration:none;display:inline-flex;align-items:center;gap:0.4rem;">
            <i class="fas fa-arrow-left"></i> Back to My Assignments
        </a>
    </div>
</div>
{% endblock %}
