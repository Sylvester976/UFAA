{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Committee{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">  
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">  
    <!-- Custom CSS -->
    <link href="{% static 'assets/css/hr_base.css' %}" rel="stylesheet">
</head>
<body>

<!-- Topbar -->
<div class="hr-topbar">
    <div class="hr-logo">
        Committee Dashboard
    </div>
    <div class="hr-topbar-right">
        <span class="hr-user">Welcome, {{ request.user.first_name }}</span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light ms-3">Logout</a>
    </div>
</div>

<div class="hr-layout">

    <!-- Sidebar -->
    <div class="hr-sidebar">
        <div class="sidebar-header">
            <h6>MENU</h6>
        </div>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{% url 'panelist_dashboard' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'panelist_dashboard' %}active{% endif %}">
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    Assigned Vacancies
                </a>
            </li>
        </ul>
    </div>

    <!-- Content -->
    <div class="hr-content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
