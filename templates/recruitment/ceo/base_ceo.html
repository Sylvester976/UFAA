{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}CEO Dashboard{% endblock %}</title>

<link href="{% static 'assets/css/google_font.css?family=Open+Sans:300,400,600,700' %}" rel="stylesheet"/>
<link href="{% static 'assets/css/nucleo-icons.css' %}" rel="stylesheet"/>
<link href="{% static 'assets/css/nucleo-svg.css' %}" rel="stylesheet"/>
<link href="{% static 'assets/css/font-awesome/all.min.css' %}" rel="stylesheet">
<link href="{% static 'assets/css/swal2/bootstrap.min.css' %}" rel="stylesheet">
<link href="{% static 'assets/css/soft-ui-dashboard.css' %}" rel="stylesheet"/>

<style>

/* ================================
   UFAA Brand Colors
================================ */

:root {
    --ufaa-navy: #1D255B;
    --ufaa-navy-deep: #141A45;
    --ufaa-gold: #F9E6A1;
    --ufaa-gold-dark: #C7B77F;
    --ufaa-gold-mid: #E0CA7A;
}

/* ================================
   Sidebar
================================ */

.sidenav {
    background: var(--ufaa-navy);
}

.sidenav .nav-link {
    color: rgba(255,255,255,0.85);
}

.sidenav .nav-link:hover {
    background: rgba(255,255,255,0.08);
}

.sidenav .nav-link.active {
    background: linear-gradient(
        135deg,
        var(--ufaa-gold-mid),
        var(--ufaa-gold)
    );
    color: var(--ufaa-navy);
    font-weight: 600;
}

/* Sidebar Icons */

.icon-shape {
    background: rgba(255,255,255,0.08) !important;
}

.nav-link.active .icon-shape {
    background: var(--ufaa-navy) !important;
}

.nav-link.active i {
    color: var(--ufaa-gold);
}

/* ================================
   Navbar
================================ */

.navbar-main {
    background: white;
}

/* ================================
   Buttons
================================ */

.btn-primary {
    background: var(--ufaa-navy);
    border: none;
}

.btn-primary:hover {
    background: var(--ufaa-navy-deep);
}

.btn-outline-danger {
    border-color: var(--ufaa-navy);
    color: var(--ufaa-navy);
}

.btn-outline-danger:hover {
    background: var(--ufaa-navy);
    color: white;
}

/* ================================
   Cards
================================ */

.card {
    border: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

</style>

</head>

<body class="g-sidenav-show bg-gray-100">


<!-- Sidebar -->
<aside class="sidenav navbar navbar-vertical navbar-expand-xs border-0 border-radius-xl my-3 fixed-start ms-3"
       id="sidenav-main">

    <div class="sidenav-header">
        <h6 class="ms-3 mt-3 text-white">CEO MENU</h6>
    </div>

    <hr class="horizontal light mt-0">

    <div class="collapse navbar-collapse w-auto">

        <ul class="navbar-nav">

            <li class="nav-item">
                <a class="nav-link {% if request.resolver_match.url_name == 'ceo_dashboard' %}active{% endif %}"
                   href="{% url 'ceo_dashboard' %}">
                   
                    <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center">
                        <i class="fas fa-chart-line"></i>
                    </div>

                    <span class="nav-link-text">Dashboard</span>

                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">

                    <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center">
                        <i class="fas fa-check-circle"></i>
                    </div>

                    <span class="nav-link-text">Pending Approvals</span>

                </a>
            </li>

        </ul>

    </div>

</aside>



<!-- Main Content -->
<main class="main-content position-relative max-height-vh-100 h-100 mt-1 border-radius-lg">


<!-- Navbar -->
<nav class="navbar navbar-main navbar-expand-lg px-0 mx-4 shadow-none border-radius-xl mt-4">

<div class="container-fluid py-1 px-3">

<h6 class="font-weight-bolder mb-0">
CEO Dashboard
</h6>

<div class="collapse navbar-collapse mt-sm-0 mt-2">

<ul class="navbar-nav ms-auto">

<li class="nav-item d-flex align-items-center">
<span class="me-3 text-sm">
Welcome, {{ request.user.first_name }}
</span>
</li>

<li class="nav-item d-flex align-items-center">
<a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">
Logout
</a>
</li>

</ul>

</div>

</div>

</nav>



<!-- Page Content -->
<div class="container-fluid py-4">

{% block content %}{% endblock %}

</div>

</main>



<script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>
<script src="{% static 'assets/js/core/popper.min.js' %}"></script>
<script src="{% static 'assets/js/core/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/js/soft-ui-dashboard.min.js' %}"></script>

</body>
</html>
