{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}CEO{% endblock %}</title>
    <!-- Bootstrap CSS (use CDN for consistency) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{% static 'assets/css/hr_base.css' %}" rel="stylesheet">
</head>
<body>

<!-- Topbar -->
<div class="hr-topbar d-flex justify-content-between align-items-center px-3">
    <div class="hr-logo">
        CEO Dashboard
    </div>
    <div class="hr-topbar-right">
        <span class="hr-user">Welcome, {{ request.user.first_name }}</span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light ms-3">Logout</a>
    </div>
</div>

<div class="hr-layout d-flex">

    <!-- Sidebar -->
    <nav class="hr-sidebar bg-light vh-100 p-3">
        <div class="sidebar-header mb-3">
            <h6>CEO MENU</h6>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{% url 'ceo_dashboard' %}" 
                   class="nav-link {% if request.resolver_match.url_name == 'ceo_dashboard' %}active{% endif %}">
                   Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    Pending Approvals
                </a>
            </li>
        </ul>
    </nav>

    <!-- Content -->
    <main class="hr-content flex-grow-1 p-4">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
