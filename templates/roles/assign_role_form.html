{% extends 'recruitment/hr/base_hr.html' %}
{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm">
        <div class="card-header bg-light">
            <h4 class="mb-0">
                Assign Roles to {{ user.first_name }} {{ user.last_name }}
            </h4>
        </div>

        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Select Roles
                    </label>

                    <div class="row">
                        {% for role in roles %}
                            <div class="col-md-4 mb-3">
                                <div class="form-check">

                                    <input 
                                        type="checkbox"
                                        name="role"
                                        value="{{ role.id }}"
                                        id="role_{{ role.id }}"
                                        class="form-check-input"
                                        {% if role.id in assigned_role_ids %}
                                            checked
                                        {% endif %}
                                    >

                                    <label for="role_{{ role.id }}"
                                           class="form-check-label">
                                        {{ role.name }}
                                    </label>

                                </div>
                            </div>
                        {% empty %}
                            <div class="text-muted">
                                No roles available.
                            </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Save Roles
                    </button>

                    <a href="{% url 'user_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
