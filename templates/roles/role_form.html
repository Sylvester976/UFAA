{% extends 'recruitment/hr/base_hr.html' %}
{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm">
        <div class="card-header bg-light">
            <h4 class="mb-0">Update Role</h4>
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <!-- Name -->
                <div class="mb-3">
                    <label for="id_name" class="form-label">Name</label>
                    <input type="text"
                           name="name"
                           id="id_name"
                           maxlength="150"
                           class="form-control"
                           value="{{ role.name }}"
                           required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label for="id_description" class="form-label">Description</label>
                    <textarea name="description"
                              id="id_description"
                              rows="4"
                              class="form-control">{{ role.description }}</textarea>
                </div>

                <!-- Permissions -->
                <div class="mb-4">
                    <label class="form-label">Permissions</label>

                    <div class="row">
                        {% for permission in permissions %}
                            <div class="col-md-4 mb-2">
                                <div class="form-check">
                                    <input type="checkbox"
                                           name="permissions"
                                           value="{{ permission.id }}"
                                           id="perm_{{ permission.id }}"
                                           class="form-check-input"
                                           {% if permission in role.permissions.all %}checked{% endif %}>
                                    <label for="perm_{{ permission.id }}"
                                           class="form-check-label">
                                        {{ permission.name }}
                                    </label>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Update Role
                    </button>
                    <a href="{% url 'role_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

{% endblock %}
