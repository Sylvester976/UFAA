<form method="post">
    {% csrf_token %}

    <div>
        <label for="id_name">Name</label>
        <input 
            type="text" 
            name="name" 
            id="id_name" 
            maxlength="150" 
            required
        >
    </div>

    <div>
        <label for="id_code">Code</label>
        <input 
            type="text" 
            name="code" 
            id="id_code" 
            maxlength="150" 
            required
        >
    </div>

    <div>
        <label for="id_description">Description</label>
        <textarea 
            name="description" 
            id="id_description"
            rows="4"
        ></textarea>
    </div>

    <button type="submit">Save Permission</button>
</form>
