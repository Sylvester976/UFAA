{% extends 'layout/auth_layout.html' %}
{% load static %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card card">

        <div class="card-header pb-0 bg-transparent text-center">
            <a href="#" class="logo d-flex justify-content-center align-items-center">
                <img alt="Court of Arms"
                     src="{% static 'assets/img/logos/court_of_arms.png' %}"
                     style="max-height:80px;">
                <div class="logo-divider mx-2"></div>
                <img alt="UFAA Logo"
                     src="{% static 'assets/img/logos/ufaa_logo.png' %}"
                     style="max-height:80px;">
            </a>
            <br>
            <h3 class="font-weight-bolder" style="color:#003366;">Staff Password Reset</h3>

            <p class="mb-0" style="font-size:0.85rem;color:#67748e;">
                Enter your staff email address.<br>
                We'll send you a password reset link.
            </p>
        </div>

        <div class="card-body">

            <form id="forgotForm">
                {% csrf_token %}

                <label>Email Address</label>

                <div class="mb-3">
                    <input type="email"
                           class="form-control"
                           name="email"
                           id="email"
                           placeholder="Enter your staff email"
                           autocomplete="off">
                </div>

                <div class="text-center">
                    <button class="btn w-100 mb-0"
                            style="background-color:#003366;border-color:#003366;color:white;"
                            type="submit">
                        Send Reset Link
                    </button>
                </div>

            </form>

        </div>

        <div class="card-footer text-center pt-0 px-lg-2 px-1">
            <p class="mb-0 text-sm mx-auto">
                Remember your password?
                <a class="fw-bold"
                   style="color:#003366;"
                   href="{% url 'login' %}">
                    Sign in
                </a>
            </p>
        </div>

    </div>
</div>

<script>

document.getElementById('forgotForm').addEventListener('submit', function(e){

    e.preventDefault();

    const email = document.getElementById('email').value.trim();

    if(!email){
        Swal.fire({
            icon:'warning',
            title:'Required',
            text:'Please enter your email address.',
            confirmButtonColor:'#003366'
        });
        return;
    }

    Swal.fire({
        title:'Sending…',
        allowOutsideClick:false,
        showConfirmButton:false,
        didOpen:()=>Swal.showLoading()
    });

    const fd = new FormData();
    fd.append('email', email);
    fd.append('csrfmiddlewaretoken', document.querySelector('[name="csrfmiddlewaretoken"]').value);

    fetch("{% url 'staff_send_reset_link' %}", {method:'POST', body:fd})
    .then(r=>r.json())
    .then(data=>{

        Swal.close();

        Swal.fire({
            icon: data.status === 'success' ? 'success' : 'error',
            title: data.status === 'success' ? 'Check Your Email' : 'Error',
            text: data.message,
            confirmButtonColor:'#003366'
        }).then(()=>{

            if(data.status === 'success'){
                window.location.href = "{% url 'login' %}";
            }

        });

    })
    .catch(()=>{

        Swal.close();

        Swal.fire({
            icon:'error',
            title:'Error',
            text:'A system error occurred. Please try again.',
            confirmButtonColor:'#003366'
        });

    });

});

</script>

{% endblock %}
