<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #f4f6f9;
}
.sidebar {
  width: 220px;
  background: #1f2937;
  color: white;
  height: 100vh;
  padding: 20px;
}
.sidebar h2 {
  text-align: center;
}
.sidebar ul {
  list-style: none;
  padding: 0;
}
.sidebar ul li {
  padding: 10px;
  cursor: pointer;
}
.sidebar ul li:hover {
  background: #374151;
}
.main {
  flex: 1;
  padding: 20px;
}
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 8px;
}
.chart, .table {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>My Dashboard</h2>
  <ul>
    <li>Dashboard</li>
    <li>Analytics</li>
    <li>Sales</li>
    <li>Reports</li>
    <li>Settings</li>
  </ul>
</div>

<div class="main">
  <div class="header">
    <h1>Dashboard Overview</h1>
    <div>User Profile</div>
  </div>

  <div class="cards">
    <div class="card">Revenue: $12,500</div>
    <div class="card">Users: 1,240</div>
    <div class="card">Orders: 320</div>
    <div class="card">Conversion: 4.5%</div>
  </div>

  <div class="chart">
    <h3>Sales Chart</h3>
    <p>[Chart Placeholder]</p>
  </div>

  <div class="table">
    <h3>Recent Transactions</h3>
    <p>[Table Placeholder]</p>
  </div>

</div>

</body>
</html>
