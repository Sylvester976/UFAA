{% extends 'recruitment/base.html' %}
{% block title %}Assign Roles{% endblock %}

{% block content %}

<div class="container-fluid py-2">

    <div class="dash-header-banner mb-2">
        <h4>
            <i class="fas fa-user-tag me-2" style="color:var(--gold-dark);"></i>
            Assign User Roles
        </h4>
        <p>{{ user.first_name }} {{ user.last_name }}</p>
    </div>

    <div class="gold-divider"></div>

    <div class="row justify-content-center">
        <div class="col-lg-5">

            <div class="card dash-card brand-card">

                <div class="card-header">
                    <h6 class="mb-0">Available Roles</h6>
                    <p>Select roles to assign to this user</p>
                </div>

                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        <div class="list-group mb-3">

                            {% for role in roles %}

                            <label class="list-group-item d-flex align-items-center">

                                <input
                                    type="checkbox"
                                    name="role"
                                    value="{{ role.id }}"
                                    class="form-check-input me-2"
                                    id="role_{{ role.id }}"
                                    {% if role in user.role.all %}checked{% endif %}
                                >

                                <span>
                                    <i class="fas fa-user-shield me-2" style="opacity:.3;"></i>
                                    {{ role.name }}
                                </span>

                            </label>

                            {% endfor %}

                        </div>

                        <button type="submit" class="btn btn-brand">
                            <i class="fas fa-save me-1"></i>
                            Save Roles
                        </button>

                        <a href="{% url 'user_list' %}" class="btn btn-outline-brand">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
