{% extends 'layout/auth_layout.html' %}
{% load static %}

{% block content %}
    <div class="login-wrapper">
        <div class="login-card card">

            <div class="card-header pb-0 bg-transparent text-center">
                <a href="#" class="logo d-flex justify-content-center align-items-center">
                    <img alt="Court of Arms" src="{% static 'assets/img/logos/court_of_arms.png' %}"
                         style="max-height:80px;">
                    <div class="logo-divider mx-2"></div>
                    <img alt="UFAA Logo" src="{% static 'assets/img/logos/ufaa_logo.png' %}" style="max-height:80px;">
                </a>
                <h3 class="font-weight-bolder" style="color:#003366;">Forgot Password</h3>
                <p class="mb-0" style="font-size:0.85rem;color:#67748e;">
                    Enter your ID number or email address.<br>
                    We'll send a reset link to your registered email.
                </p>
            </div>

            <div class="card-body">
                <form id="forgotForm">
                    {% csrf_token %}
                    <label>ID Number or Email</label>
                    <div class="mb-3">
                        <input type="text" class="form-control" name="identifier"
                               id="identifier" placeholder="Enter ID number or email"
                               autocomplete="off">
                    </div>
                    <div class="text-center">
                        <button class="btn w-100 mb-0"
                                style="background-color:#003366;border-color:#003366;color:white;"
                                type="submit">
                            Send Reset Link
                        </button>
                    </div>
                </form>
            </div>

            <div class="card-footer text-center pt-0 px-lg-2 px-1">
                <p class="mb-0 text-sm mx-auto">
                    Remember your password?
                    <a class="fw-bold" style="color:#003366;" href="{% url 'index' %}">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const identifier = document.getElementById('identifier').value.trim();
            if (!identifier) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Required',
                    text: 'Please enter your ID number or email.',
                    confirmButtonColor: '#003366'
                });
                return;
            }

            Swal.fire({
                title: 'Sending…', allowOutsideClick: false,
                showConfirmButton: false, didOpen: () => Swal.showLoading()
            });

            const fd = new FormData();
            fd.append('identifier', identifier);
            fd.append('csrfmiddlewaretoken', document.querySelector('[name="csrfmiddlewaretoken"]').value);

            fetch("{% url 'send_reset_link' %}", {method: 'POST', body: fd})
                .then(r => r.json())
                .then(data => {
                    Swal.close();
                    Swal.fire({
                        icon: data.status === 'success' ? 'success' : 'error',
                        title: data.status === 'success' ? 'Check Your Email' : 'Error',
                        text: data.message,
                        confirmButtonColor: '#003366',
                    }).then(() => {
                        if (data.status === 'success') window.location.href = "{% url 'index' %}";
                    });
                })
                .catch(() => {
                    Swal.close();
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'A system error occurred. Please try again.',
                        confirmButtonColor: '#003366'
                    });
                });
        });
    </script>
{% endblock %}
