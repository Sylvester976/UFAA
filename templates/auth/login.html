{% extends 'layout/auth_layout.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card card">

        <div class="card-header pb-0 bg-transparent text-center">
            <a href="#" class="logo d-flex justify-content-center align-items-center">
                <img src="{% static 'assets/img/logos/court_of_arms.png' %}"
                     alt="Court of Arms" style="max-height:80px;">
                <div class="logo-divider mx-2"></div>
                <img src="{% static 'assets/img/logos/ufaa_logo.png' %}"
                     alt="UFAA Logo" style="max-height:80px;">
            </a>
            <br>
            <h3 class="font-weight-bolder" style="color:#003366;">Welcome</h3>
            <p class="mb-0">Enter your National ID Number and Password to sign in</p>
        </div>

        <div class="card-body">
            <form id="loginform" method="post">
                {% csrf_token %}

                <label for="idnoInput">National ID Number</label>
                <div class="mb-3">
                    <input id="idnoInput"
                           type="text"
                           inputmode="numeric"
                           class="form-control"
                           name="idno"
                           placeholder="Identification Number"
                           autocomplete="username">
                </div>

                <label for="passwordInput">Password</label>
                <div class="mb-1 input-group">

                    <input id="passwordInput"
                           type="password"
                           class="form-control"
                           name="password"
                           placeholder="Password"
                           autocomplete="current-password">

                    <span class="input-group-text"
                          onclick="togglePassword()"
                          title="Toggle password visibility"
                          style="cursor:pointer">

                        <!-- eye -->
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
                             fill="none" viewBox="0 0 24 24"
                             stroke="#999" stroke-width="2"
                             width="18" height="18">

                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0
                                  8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542
                                  7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>

                        <!-- eye off -->
                        <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg"
                             fill="none" viewBox="0 0 24 24"
                             stroke="#999" stroke-width="2"
                             width="18" height="18"
                             style="display:none">

                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M13.875 18.825A10.05 10.05 0 0112 19
                                  c-4.477 0-8.268-2.943-9.542-7
                                  a9.97 9.97 0 012.516-4.034"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M9.9 4.24A9.969 9.969 0 0112 5
                                  c4.477 0 8.268 2.943 9.542 7
                                  a10.025 10.025 0 01-4.132 5.411"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M3 3l18 18"/>
                        </svg>

                    </span>
                </div>

                <div class="text-end mb-3 mt-1">
                    <a href="{% url 'forgot_password' %}"
                       style="font-size:0.78rem;color:#003366;font-weight:600;text-decoration:none;">
                        Forgot password?
                    </a>
                </div>

                <div class="text-center">
                    <button type="submit"
                            class="btn w-100"
                            style="background:#003366;border-color:#003366;color:white;">
                        Sign In
                    </button>
                </div>

            </form>
        </div>

        <div class="card-footer text-center pt-0">
            <p class="mb-0 text-sm">
                Don't have an account?
                <a href="{% url 'signup' %}"
                   class="fw-bold" style="color:#003366;">
                   Sign up
                </a>
            </p>
        </div>

    </div>
</div>


<script>

/* Password toggle */
function togglePassword() {

    const input = document.getElementById("passwordInput");
    const eye = document.getElementById("eyeIcon");
    const eyeOff = document.getElementById("eyeOffIcon");

    if (input.type === "password") {
        input.type = "text";
        eye.style.display = "none";
        eyeOff.style.display = "inline";
    } else {
        input.type = "password";
        eye.style.display = "inline";
        eyeOff.style.display = "none";
    }
}


/* Login AJAX */

document.getElementById("loginform").addEventListener("submit", function(e){

    e.preventDefault();

    Swal.fire({
        title: "Signing in…",
        text: "Please wait.",
        allowOutsideClick:false,
        showConfirmButton:false,
        didOpen: () => Swal.showLoading()
    });

    const form = e.target;
    const formData = new FormData(form);

    fetch("{% url 'authlogin' %}",{
        method:"POST",
        headers:{
            "X-CSRFToken": form.querySelector("[name=csrfmiddlewaretoken]").value
        },
        body:formData
    })

    .then(r=>r.json())
    .then(data=>{

        Swal.close();

        if(data.status==="success"){

            Swal.fire({
                icon:"success",
                title:"Login Successful",
                text:data.message,
                showConfirmButton:false,
                timer:1200
            }).then(()=>{
                window.location.href="/recruitment/dashboard/";
            });

        }

        else if(data.status==="locked"){

            Swal.fire({
                icon:"error",
                title:"Account Locked",
                text:data.message,
                confirmButtonColor:"#003366",
                confirmButtonText:"Reset Password"
            }).then(r=>{
                if(r.isConfirmed){
                    window.location.href="{% url 'forgot_password' %}";
                }
            });

        }

        else{

            Swal.fire({
                icon:"error",
                title:"Login Failed",
                text:data.message || "Authentication failed.",
                confirmButtonColor:"#003366"
            });

        }

    })

    .catch(()=>{
        Swal.fire({
            icon:"error",
            title:"System Error",
            text:"Please try again later.",
            confirmButtonColor:"#003366"
        });
    });

});

</script>

{% endblock %}
